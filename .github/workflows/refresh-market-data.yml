# 每个美股交易日收盘后刷新价格表
# 触发时刻：UTC 周一-周五 23:30 = 北京时间周二-周六 07:30
# 美股夏令时收盘 04:00（北京时间），冬令时 05:00（北京时间）；07:30 跑可冬夏统一覆盖
# 复用项目里的 `pnpm run refresh:market-data`：fetch -> convert -> generate -> check
name: Refresh Market Data

on:
  schedule:
    - cron: '30 23 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-market-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 需要写权限把刷新后的数据 commit 回 main
          persist-credentials: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements-market-data.txt

      - name: Install Python dependencies
        run: python -m pip install -r scripts/requirements-market-data.txt

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Refresh market data
        env:
          # 可选：在仓库 Settings -> Secrets and variables -> Actions 配置
          # 配置后 yfinance/akshare 在美股部分失败时会回落到 Alpha Vantage
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: pnpm run refresh:market-data

      - name: Stage data changes
        id: stage
        run: |
          git add public/data src/data/stock-index.json src/data/lp-onchain-snapshots.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "no data changes detected"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "changes staged:"
            git diff --cached --stat
          fi

      - name: Commit and push
        if: steps.stage.outputs.changed == 'true'
        run: |
          git config user.name "marketlab-bot"
          git config user.email "marketlab-bot@users.noreply.github.com"
          DATE_TAG=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          git commit -m "chore(data): refresh market price tables ${DATE_TAG}"
          git push origin HEAD:${{ github.ref_name }}
