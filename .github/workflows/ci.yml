# Continuous Integration：每次 push / PR 跑 lint + test + build。
# verify:pine 只在 Pine 相关文件变化时执行，避免无关 commit 浪费 minutes。
name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'public/data/**'
      - 'src/data/stock-index.json'
      - 'src/data/lp-onchain-snapshots.json'
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: lint + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm test

      # build 链路已包含 check:size + check:domain-boundary + check:data
      # + check:generated-data + verify:domain + vite build
      - name: Build
        run: pnpm run build

      # 仅在改动涉及 Pine 文件时跑 Pine 校验
      - name: Detect Pine changes
        id: pine
        run: |
          if git diff --name-only HEAD^ HEAD 2>/dev/null | grep -E '\.(pine)$|verify-pine' > /dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify Pine
        if: steps.pine.outputs.changed == 'true'
        run: pnpm run verify:pine
